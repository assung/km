# 2026-05-26 對齊 DS repo pattern(netlify.toml + Netlify Git integration)
# Per user 「為何要設這個 secret?」challenge — DS repo 就沒用 secret,直接 Netlify 連 repo auto-build。
#
# Fork-and-go 流程(painless,無需 GitHub secret):
#   1. Netlify Dashboard → New site → 連 fork 後的 ds-product-template repo
#   2. Netlify 自動讀本 file → build storybook-static → deploy
#   3. 完成。每次 push main → Netlify auto rebuild。
#
# 註:本 repo 無獨立 deploy workflow — deploy 全經 Netlify Git integration(讀本 file build command)。
# CI 只有 audit.yml(tsc + lint:imports + build)+ sync-design-system.yml(Dependabot/DS 版本同步)。

[build]
  command = "npm run build-storybook"
  publish = "storybook-static"

[build.environment]
  NODE_VERSION = "22"

# Per-branch deploy previews 預設啟用(任何 branch push → 自動 preview URL)
# Production deploy 走 main(production URL = 永遠最新 main 的 storybook)

# ─── Access control(2026-05-26 per user directives)──────────────────────────
# Netlify deploy 預設公開,Storybook 含內部產品 UI 必限團隊內部 access。**2 道防線**:
#
# 1️⃣ Defense-in-depth(本檔 headers):反 SEO indexing
#    X-Robots-Tag noindex(Google/Bing 不收錄)+ Referrer / X-Frame headers
#    只防 SEO 不防直接訪問,必須配第 2 道。
#
# 2️⃣ Real auth(免費 Edge Function Basic Auth,2026-06 實測修正):
#    netlify/edge-functions/basic-auth.ts 比對 Netlify 環境變數 BASIC_AUTH_USER/PASSWORD,
#    不符回 401 觸發瀏覽器帳密彈窗擋整站(下方 [[edge_functions]] 宣告)。
#    ⚠️ 為何不用 `_headers`:free 方案「不執行」`_headers` 的 Basic-Auth(實測 curl 回 200);
#    dashboard Password Protection 是 **Pro $20/mo 付費**;Identity 已 2024 deprecated。
#    → free 方案唯一真正可用的是 edge function。
#
# 完整 step-by-step 詳 README「Storybook deploy」段。

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"

# ─── 免費密碼保護(Edge Function Basic Auth)──────────────────────────────────
# free 方案不認 `_headers` Basic-Auth、dashboard password 又是 Pro 付費,故改用 edge
# function 自己擋。帳密放 Netlify 環境變數 BASIC_AUTH_USER / BASIC_AUTH_PASSWORD
# (dashboard 設,不進 repo;沒設 = 不擋)。實作見 netlify/edge-functions/basic-auth.ts。
[[edge_functions]]
  path = "/*"
  function = "basic-auth"

