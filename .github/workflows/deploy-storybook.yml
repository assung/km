# 2026-05-26 ship per user 「product-workspace 不是應該用 storybook 來 demo 產品嗎?
#   我為何在 netlify 沒有看到?」directive。
#
# Deploy product-workspace Storybook to Netlify(separate site from apps/_template app deploy)。
# Fork-and-go canonical:fork product-workspace + register 2 Netlify sites:
#   1. App site(secret: NETLIFY_SITE_ID_TEMPLATE)— `apps/_template/dist` static product
#   2. Storybook site(secret: NETLIFY_SITE_ID_STORYBOOK)— `storybook-static` PM/designer/QA surface
# 兩個 site 共享 NETLIFY_AUTH_TOKEN(same Netlify account)。
#
# 對齊 DS repo netlify.toml(同 pattern:storybook-static publish)。

name: Deploy Storybook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-storybook:
    name: Build + Deploy Storybook to Netlify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # 2026-05-26 fix:`secrets` 不能直接在 step `if:` 用 — bridge to job-level env first
    env:
      HAS_NETLIFY_STORYBOOK_SECRETS: ${{ secrets.NETLIFY_SITE_ID_STORYBOOK != '' && secrets.NETLIFY_AUTH_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps

      - name: Build Storybook(consumes @qijenchen/storybook-config shared preset)
        run: npm run build-storybook

      - name: Deploy to Netlify Storybook site
        if: env.HAS_NETLIFY_STORYBOOK_SECRETS == 'true'
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: storybook-static
          production-deploy: ${{ github.ref == 'refs/heads/main' }}
          deploy-message: "${{ github.event.head_commit.message || github.ref }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_STORYBOOK }}

      - name: Notice if secrets missing
        if: env.HAS_NETLIFY_STORYBOOK_SECRETS != 'true'
        run: |
          echo "::warning::Netlify deploy skipped — set secrets NETLIFY_SITE_ID_STORYBOOK + NETLIFY_AUTH_TOKEN to enable"
          echo "::warning::See README.md「CI secrets needed」段 for setup steps"
